<input [(ngModel)]="taskText" type="text">
<button (click)="addTask()">Add</button>

<ol>
@for (task of tasks(); track task.id){
  
    <li>{{task.id}} {{task.title}} 
    <button (click)="deleteTask(task.id)">Delete</button></li>
  
} @empty {
  <p>There are no tasks yet</p>
}
</ol>
